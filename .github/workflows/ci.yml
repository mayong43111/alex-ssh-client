name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish win-x64 single file
        run: >
          dotnet publish src/SSHClient.App/SSHClient.App.csproj
          --configuration Release
          --runtime win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output artifacts/publish/win-x64-single

      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $publishDir = Join-Path $PWD "artifacts/publish/win-x64-single"
          $packageDir = Join-Path $PWD "artifacts/package"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          Copy-Item (Join-Path $publishDir "SSHClient.App.exe") (Join-Path $packageDir "Alex SSH Client.exe") -Force

          $zipName = "Alex-SSH-Client-$version-win-x64.zip"
          $zipPath = Join-Path $PWD $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $packageDir "*") -DestinationPath $zipPath

          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP_PATH }}
